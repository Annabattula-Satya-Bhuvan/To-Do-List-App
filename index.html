<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:450px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 18px;
    background:#2196f3;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#1565c0;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    background:#f2f2f2;
    padding:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:5px;
}

.completed{
    text-decoration:line-through;
    color:green;
}

.actions button{
    margin-left:5px;
}
</style>

</head>
<body>

<div class="container">

<h1>📝 To-Do List</h1>

<div class="input-group">
<input type="text" id="taskInput" placeholder="Enter a task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = [];

function addTask(){

    const input = document.getElementById("taskInput");

    const text = input.value.trim();

    if(text===""){
        alert("Please enter a task.");
        return;
    }

    tasks.push({
        task:text,
        completed:false
    });

    input.value="";

    displayTasks();

}

function displayTasks(){

    const list=document.getElementById("taskList");

    list.innerHTML="";

    tasks.forEach((task,index)=>{

        const li=document.createElement("li");

        if(task.completed){
            li.classList.add("completed");
        }

        li.innerHTML=`
        <span>${task.task}</span>

        <div class="actions">

        <button onclick="completeTask(${index})">
        ✔
        </button>

        <button onclick="deleteTask(${index})">
        🗑
        </button>

        </div>
        `;

        list.appendChild(li);

    });

}

function completeTask(index){

    tasks[index].completed=true;

    displayTasks();

}

function deleteTask(index){

    tasks.splice(index,1);

    displayTasks();

}

</script>

</body>
</html>
